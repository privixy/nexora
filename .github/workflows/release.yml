name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    steps:
      - name: Create release
        id: create-release
        uses: actions/github-script@v9
        with:
          script: |
            const tag = context.eventName === 'workflow_dispatch'
              ? core.getInput('tag', { required: true })
              : context.ref.replace('refs/tags/', '')
            const owner = context.repo.owner
            const repo = context.repo.repo
            try {
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag })
              return data.id
            } catch (error) {
              if (error.status !== 404) throw error
            }
            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: tag,
              generate_release_notes: true,
              draft: true,
              prerelease: /-(alpha|beta|rc)\.?\d*$/i.test(tag),
            })
            return data.id

  build-tauri:
    name: Build ${{ matrix.platform }}
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin --bundles dmg
          - platform: ubuntu-latest
            args: --bundles deb
          - platform: windows-latest
            args: --bundles nsis
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          check-latest: true
          cache: pnpm

      - name: Setup Rust
        if: runner.os != 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust macOS universal targets
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    name: Publish release
    needs:
      - create-release
      - build-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number('${{ needs.create-release.outputs.release_id }}'),
              draft: false,
            })
