name: Release dry run

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/release-dry-run.yml
      - src-tauri/**
      - src/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - vite.config.ts
      - tsconfig*.json
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-tauri:
    name: Dry run ${{ matrix.platform }} ${{ matrix.architecture }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            architecture: aarch64
            args: '--target aarch64-apple-darwin --bundles dmg --config {"bundle":{"createUpdaterArtifacts":false}}'
          - platform: macos-latest
            architecture: x86_64
            args: '--target x86_64-apple-darwin --bundles dmg --config {"bundle":{"createUpdaterArtifacts":false}}'
          - platform: ubuntu-latest
            architecture: x86_64
            args: '--bundles deb --config {"bundle":{"createUpdaterArtifacts":false}}'
          - platform: windows-latest
            architecture: x86_64
            args: '--bundles nsis --config {"bundle":{"createUpdaterArtifacts":false}}'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          check-latest: true
          cache: pnpm

      - name: Setup Rust
        if: runner.os != 'macOS'
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust macOS universal targets
        if: runner.os == 'macOS'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v1.0.0
        with:
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          workflowArtifactNamePattern: ${{ runner.os }}-nexora-[artifactName]
