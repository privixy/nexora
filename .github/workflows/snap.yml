name: Snap package

on:
  workflow_dispatch:
    inputs:
      version:
        description: Snap version to publish
        required: true
        type: string
      deb-url:
        description: URL to the Linux amd64 deb release asset
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: snap-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ vars.ENABLE_STORE_PUBLISH == 'true' }}
    name: Build and publish Snap
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve release asset
        id: asset
        uses: actions/github-script@v9
        with:
          script: |
            if (context.eventName === 'workflow_dispatch') {
              core.setOutput('version', core.getInput('version', { required: true }))
              core.setOutput('deb_url', core.getInput('deb-url', { required: true }))
              return
            }
            const release = context.payload.release
            const tag = release.tag_name.replace(/^v/, '')
            const asset = release.assets.find((item) => /amd64\.deb$/.test(item.name))
            if (!asset) core.setFailed('No amd64 .deb asset found on release')
            core.setOutput('version', tag)
            core.setOutput('deb_url', asset.browser_download_url)

      - name: Prepare snapcraft source
        run: |
          curl -L '${{ steps.asset.outputs.deb_url }}' -o snap/nexora.deb
          sed -i "s/^version: .*/version: \"${{ steps.asset.outputs.version }}\"/" snap/snapcraft.yaml

      - name: Build snap
        uses: canonical/action-build@v1.3.0
        id: build
        with:
          path: snap

      - name: Publish snap
        uses: canonical/action-publish@v1.2.0
        with:
          store_login: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          snap: ${{ steps.build.outputs.snap }}
          release: stable
