name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          check-latest: true
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test -- --run

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build plugin API
        run: pnpm build:plugin-api

      - name: Check plugin API sync
        run: pnpm check:plugin-api

      - name: Build create-plugin
        run: pnpm build:create-plugin

      - name: Smoke create-plugin
        run: pnpm smoke:create-plugin

      - name: Build frontend
        run: pnpm build

  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          check-latest: true
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rust tests
        run: pnpm test:rust
