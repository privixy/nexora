name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-latest
    steps: &node-steps
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.30.3
      - uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:repository --run
      - run: pnpm validate:distribution
  desktop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.30.3
      - uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:desktop --run
      - run: pnpm --filter @nexora/desktop typecheck:plugin-contract
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build
  plugin-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.30.3
      - uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nexora/plugin-api check
  create-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.30.3
      - uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nexora/plugin-api build
      - run: pnpm --filter @nexora/plugin-api check:sync
      - run: pnpm --filter @nexora/plugin-api pack:stage
      - run: pnpm --filter @nexora/plugin-api pack:check
      - run: pnpm --filter @nexora/create-plugin check
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev libgtk-3-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.30.3
      - uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: apps/desktop/src-tauri
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:plugin-contract
      - run: pnpm lint:rust
      - run: pnpm test:rust
