name: Publish to AUR

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (without v prefix, e.g. 0.9.14)'
        required: true

jobs:
  aur-publish:
    if: ${{ vars.ENABLE_STORE_PUBLISH == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Get Release Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Download .deb Artifact
        run: |
          wget "https://github.com/${{ github.repository }}/releases/download/v${{ steps.version.outputs.version }}/nexora_${{ steps.version.outputs.version }}_amd64.deb" -O app.deb

      - name: Calculate SHA256
        id: shasum
        run: |
          echo "sha256=$(sha256sum app.deb | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update PKGBUILD
        run: |
          cd aur
          sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD
          sed -i "s/^sha256sums=.*/sha256sums=('${{ steps.shasum.outputs.sha256 }}')/" PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v4.2.0
        with:
          pkgname: nexora-bin
          pkgbuild: ./aur/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ steps.version.outputs.version }}"
          force_push: true
