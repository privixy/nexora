name: Publish to Winget

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: Release tag to submit, for example v1.0.3
        required: true
        type: string

jobs:
  winget-publish:
    if: ${{ vars.ENABLE_STORE_PUBLISH == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Submit to Winget
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Nexora.Nexora
          installers-regex: '_x64-setup\.exe$'
          release-tag: ${{ inputs.release-tag }}
          token: ${{ secrets.WINGET_TOKEN }}
