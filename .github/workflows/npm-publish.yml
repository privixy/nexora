name: Publish npm packages

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ vars.ENABLE_STORE_PUBLISH == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.30.3
      - uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @nexora/plugin-api check
      - run: pnpm --filter @nexora/create-plugin check
      - name: Validate canonical package artifacts
        run: |
          cd packages/plugin-api/.tmp/package && sha256sum --check nexora-plugin-api-0.1.0.tgz.sha256 && tar -tzf nexora-plugin-api-0.1.0.tgz && cd ../../../../
          cd packages/create-plugin/.tmp/package && sha256sum --check nexora-create-plugin-0.1.1.tgz.sha256 && tar -tzf nexora-create-plugin-0.1.1.tgz && cd ../../../../
          node scripts/npm-registry-preflight.mjs --package '@nexora/plugin-api@0.1.0'
          node scripts/npm-registry-preflight.mjs --package '@nexora/create-plugin@0.1.1'
      - name: Publish plugin API
        run: pnpm publish "packages/plugin-api/.tmp/package/nexora-plugin-api-0.1.0.tgz" --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish create-plugin
        run: pnpm publish "packages/create-plugin/.tmp/package/nexora-create-plugin-0.1.1.tgz" --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
