name: Publish npm packages

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ vars.ENABLE_STORE_PUBLISH == 'true' }}
    name: Publish npm packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.9
        with:
          version: 10.30.3

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          check-latest: true
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build plugin API
        run: pnpm build:plugin-api

      - name: Check plugin API sync
        run: pnpm check:plugin-api

      - name: Build create-plugin
        run: pnpm build:create-plugin

      - name: Smoke create-plugin
        run: pnpm smoke:create-plugin

      - name: Publish plugin API
        run: pnpm --filter @nexora/plugin-api publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish create-plugin
        run: pnpm --filter @nexora/create-plugin publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
