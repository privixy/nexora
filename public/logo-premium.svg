    <path fill="url(#pLeft)" d="M211 158 288 199 288 271 211 231Z"/>
    <path fill="url(#pRight)" d="M296 199 373 158 373 231 296 271Z"/>

    <path fill="url(#pLeft)" d="M127 203 204 244 204 316 127 276Z"/>
