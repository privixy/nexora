<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 409 409" role="img" aria-labelledby="title desc">
  <title id="title">Nexora premium logo concept</title>
  <desc id="desc">A polished isometric T mark with controlled lighting and stronger depth.</desc>
  <defs>
    <linearGradient id="pTopA" x1="46" y1="64" x2="365" y2="149" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b2865"/>
      <stop offset=".45" stop-color="#25376e"/>
      <stop offset="1" stop-color="#10d8cc"/>
    </linearGradient>
    <linearGradient id="pLeft" x1="52" y1="111" x2="210" y2="381" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222052"/>
      <stop offset=".62" stop-color="#29245f"/>
      <stop offset="1" stop-color="#8d3cc0"/>
    </linearGradient>
    <linearGradient id="pRight" x1="213" y1="153" x2="371" y2="348" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25265d"/>
