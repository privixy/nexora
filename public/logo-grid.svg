<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 409 409" role="img" aria-labelledby="title desc">
  <title id="title">Nexora grid logo concept</title>
  <desc id="desc">An isometric T mark where blocks read like database cells.</desc>
  <defs>
    <linearGradient id="cellTop" x1="50" y1="72" x2="360" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#26245c"/>
      <stop offset=".5" stop-color="#2a3a73"/>
      <stop offset="1" stop-color="#12d8ca"/>
    </linearGradient>
    <linearGradient id="cellLeft" x1="69" y1="123" x2="221" y2="345" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222051"/>
      <stop offset=".72" stop-color="#322468"/>
      <stop offset="1" stop-color="#7934ad"/>
    </linearGradient>
    <linearGradient id="cellRight" x1="222" y1="168" x2="354" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#25255a"/>
      <stop offset=".5" stop-color="#4f42b1"/>
      <stop offset="1" stop-color="#0fd5c8"/>
    </linearGradient>
    <filter id="soft" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#050512" flood-opacity=".35"/>
    </filter>
  </defs>

  <g filter="url(#soft)" stroke="#070715" stroke-width="6" stroke-linejoin="round">
