    <path fill="url(#cellTop)" d="M204 62 279 101 204 141 129 101Z"/>
    <path fill="url(#cellTop)" d="M288 106 363 145 288 185 213 145Z"/>

    <path fill="url(#cellLeft)" d="M45 70 120 109 120 181 45 142Z"/>
    <path fill="url(#cellLeft)" d="M129 114 204 153 204 225 129 186Z"/>
    <path fill="url(#cellRight)" d="M213 158 288 197 288 269 213 230Z"/>
    <path fill="url(#cellRight)" d="M297 197 372 158 372 230 297 269Z"/>

    <path fill="url(#cellLeft)" d="M129 203 204 242 204 314 129 275Z"/>
    <path fill="url(#cellRight)" d="M213 247 288 286 213 326Z"/>
    <path fill="url(#cellLeft)" d="M129 292 204 331 204 388 129 349Z"/>
    <path fill="url(#cellRight)" d="M213 331 288 292 288 349 213 388Z"/>
  </g>

  <g fill="none" stroke="#7cf7ef" stroke-width="2" stroke-linecap="round" opacity=".55">
    <path d="M73 57 120 82 167 57"/>
    <path d="M157 101 204 126 251 101"/>
    <path d="M241 145 288 170 335 145"/>
    <path d="M151 223 181 239"/>
    <path d="M151 261 181 277"/>
    <path d="M235 267 265 283"/>
